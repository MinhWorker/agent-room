name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use an OIDC-capable npm version
        run: npm install --global npm@11.18.0
      - run: npm ci
      - name: Check tag matches package version
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          test "v${VERSION}" = "${GITHUB_REF_NAME}"
      - run: npm run verify
      - run: npm run pack:cli
      - name: Publish npm package with Trusted Publishing
        run: npm publish --workspace @minhworker/agent-room --access public
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" artifacts/*.tgz --verify-tag --generate-notes
